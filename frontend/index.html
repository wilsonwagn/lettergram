<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>LetterGram — Stories Cinematográficos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── Phone shell ── */
    .phone {
      position: relative;
      width: 390px;
      height: 844px;
      border-radius: 50px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 0 6px rgba(255,255,255,0.03),
        0 40px 120px rgba(0,0,0,0.9),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    /* ── Anime background with color shift ── */
    .bg-anime {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      /* Shift blue → warm green-teal to match brand */
      filter: hue-rotate(-65deg) saturate(1.4) brightness(0.55);
      transform: scale(1.05);
    }

    /* ── Layered overlays ── */
    .overlay-top {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.55) 0%,
        rgba(0,0,0,0.05) 35%,
        rgba(0,0,0,0.0) 55%,
        rgba(0,0,0,0.75) 75%,
        rgba(0,0,0,0.97) 100%
      );
      z-index: 2;
    }
    .overlay-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 100%, rgba(204,255,0,0.09) 0%, transparent 70%);
      z-index: 3;
    }

    /* ── Content ── */
    .content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 26px 0;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
    }

    /* ── Hero area ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 28px 36px;
    }

    /* ── Logo SVG ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }
    .logo-icon {
      filter: drop-shadow(0 0 18px rgba(204,255,0,0.5)) drop-shadow(0 0 6px rgba(204,255,0,0.3));
      animation: logo-pulse 4s ease-in-out infinite;
      margin-bottom: 10px;
    }
    @keyframes logo-pulse {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(204,255,0,0.45)) drop-shadow(0 0 4px rgba(204,255,0,0.25)); }
      50%       { filter: drop-shadow(0 0 28px rgba(204,255,0,0.75)) drop-shadow(0 0 10px rgba(204,255,0,0.45)); }
    }
    .logo-wordmark {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #fff;
      line-height: 1;
    }
    .logo-wordmark span {
      color: #CCFF00;
    }
    .logo-sub {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-top: 6px;
    }

    /* ── Tagline ── */
    .tagline {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      text-align: center;
      line-height: 1.55;
      margin-bottom: 28px;
      max-width: 240px;
    }

    /* ── Form ── */
    .form-group {
      width: 100%;
      margin-bottom: 12px;
    }
    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-family: 'Material Symbols Outlined';
      font-size: 18px;
      color: rgba(255,255,255,0.25);
      pointer-events: none;
      font-variation-settings: 'FILL' 0, 'wght' 300;
    }
    .url-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 15px 16px 15px 44px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .url-input::placeholder { color: rgba(255,255,255,0.22); }
    .url-input:focus {
      border-color: rgba(204,255,0,0.4);
      box-shadow: 0 0 0 3px rgba(204,255,0,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* ── CTA Button ── */
    .btn-primary {
      width: 100%;
      background: #CCFF00;
      color: #000;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.01em;
      border: none;
      border-radius: 18px;
      padding: 16px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow:
        0 8px 32px rgba(204,255,0,0.28),
        0 2px 6px rgba(204,255,0,0.15),
        inset 0 1px 0 rgba(255,255,255,0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow:
        0 14px 40px rgba(204,255,0,0.40),
        0 4px 10px rgba(204,255,0,0.20),
        inset 0 1px 0 rgba(255,255,255,0.35);
    }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary .mat-icon {
      font-family: 'Material Symbols Outlined';
      font-size: 18px;
      font-variation-settings: 'FILL' 0, 'wght' 400;
    }

    /* ── Loading state ── */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .icon-spin {
      display: inline-block;
      animation: spin 0.85s linear infinite;
      font-size: 18px;
    }

    /* ── Bottom badge ── */
    .bottom-hint {
      text-align: center;
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.2);
      margin-top: 20px;
      letter-spacing: 0.06em;
    }
    .bottom-hint strong { color: rgba(204,255,0,0.45); font-weight: 700; }
  </style>
</head>
<body>

<div class="phone">

  <!-- Background -->
  <img class="bg-anime" src="assets/bg-hero.jpg" alt="" />
  <div class="overlay-top"></div>
  <div class="overlay-glow"></div>

  <!-- Content -->
  <div class="content">

    <!-- Status bar -->
    <div class="status-bar">
      <span>9:41</span>
      <span style="display:flex;align-items:center;gap:5px;">
        <svg width="15" height="10" viewBox="0 0 15 10" fill="none"><rect x="0" y="3" width="3" height="7" rx="0.5" fill="currentColor" opacity="0.3"/><rect x="4" y="2" width="3" height="8" rx="0.5" fill="currentColor" opacity="0.5"/><rect x="8" y="1" width="3" height="9" rx="0.5" fill="currentColor" opacity="0.75"/><rect x="12" y="0" width="3" height="10" rx="0.5" fill="currentColor"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 2.5 C10.5 2.5 12.8 3.5 14.4 5.2L15.5 4C13.6 2 11 1 8 1 5 1 2.4 2 0.5 4L1.6 5.2C3.2 3.5 5.5 2.5 8 2.5Z" fill="currentColor" opacity="0.4"/><path d="M8 5C9.8 5 11.4 5.7 12.6 6.9L13.7 5.7C12.2 4.2 10.2 3.3 8 3.3 5.8 3.3 3.8 4.2 2.3 5.7L3.4 6.9C4.6 5.7 6.2 5 8 5Z" fill="currentColor" opacity="0.7"/><circle cx="8" cy="10" r="1.5" fill="currentColor"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="currentColor" opacity="0.35"/><rect x="2" y="2" width="16" height="8" rx="2" fill="currentColor"/><path d="M23 4V8C23.8 7.5 24.5 6.8 24.5 6C24.5 5.2 23.8 4.5 23 4Z" fill="currentColor" opacity="0.4"/></svg>
      </span>
    </div>

    <!-- Hero -->
    <div class="hero">

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-icon">
          <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Film frame -->
            <rect x="6" y="12" width="44" height="32" rx="3" stroke="#CCFF00" stroke-width="2.2" fill="none"/>
            <!-- Sprocket holes left -->
            <rect x="2" y="16.5" width="5.5" height="5" rx="1.2" fill="#CCFF00"/>
            <rect x="2" y="25.5" width="5.5" height="5" rx="1.2" fill="#CCFF00"/>
            <rect x="2" y="34.5" width="5.5" height="5" rx="1.2" fill="#CCFF00"/>
            <!-- Sprocket holes right -->
            <rect x="48.5" y="16.5" width="5.5" height="5" rx="1.2" fill="#CCFF00"/>
            <rect x="48.5" y="25.5" width="5.5" height="5" rx="1.2" fill="#CCFF00"/>
            <rect x="48.5" y="34.5" width="5.5" height="5" rx="1.2" fill="#CCFF00"/>
            <!-- Lens outer ring -->
            <circle cx="28" cy="28" r="10" stroke="#CCFF00" stroke-width="1.8" fill="none"/>
            <!-- Lens inner -->
            <circle cx="28" cy="28" r="5.5" fill="#CCFF00" opacity="0.15"/>
            <circle cx="28" cy="28" r="3.5" fill="#CCFF00"/>
            <!-- Chat bubble tail (bottom-right) -->
            <path d="M36 38 L41 45 L33 42 Z" fill="#CCFF00" opacity="0.65"/>
          </svg>
        </div>
        <div class="logo-wordmark">Letter<span>gram</span></div>
        <div class="logo-sub">Cinema · Social</div>
      </div>

      <!-- Tagline -->
      <p class="tagline">
        Transforme suas reviews do Letterboxd em Stories únicos para o Instagram.
      </p>

      <!-- Form -->
      <div class="form-group">
        <div class="input-wrap">
          <span class="input-icon">link</span>
          <input id="link-input" class="url-input" type="text" placeholder="https://letterboxd.com/film/..." />
        </div>
      </div>

      <button id="gen-btn" class="btn-primary" onclick="handleGenerate()">
        <span id="btn-text">Gerar Story</span>
        <span id="btn-icon" class="mat-icon">arrow_forward</span>
      </button>

      <p class="bottom-hint">Powered by <strong>LetterGram</strong> &nbsp;·&nbsp; Beta</p>
    </div>

  </div>
</div>

<script>
async function handleGenerate() {
  const btn = document.getElementById('gen-btn');
  const btnText = document.getElementById('btn-text');
  const btnIcon = document.getElementById('btn-icon');
  const linkInput = document.getElementById('link-input').value;

  if (!linkInput.trim()) {
    document.getElementById('link-input').focus();
    return;
  }

  btnText.textContent = 'Extraindo...';
  btnIcon.className = 'mat-icon icon-spin';
  btnIcon.textContent = 'sync';
  btn.style.opacity = '0.85';
  btn.style.pointerEvents = 'none';

  try {
    const apiUrl = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' 
      ? `http://127.0.0.1:8000/api/extract?url=${encodeURIComponent(linkInput)}`
      : `/api/extract?url=${encodeURIComponent(linkInput)}`;
    const response = await fetch(apiUrl);
    if (!response.ok) throw new Error('Erro na API');

    const data = await response.json();
    console.log('📊 Dados recebidos:', data);
    localStorage.setItem('lettergram_mock_data', JSON.stringify(data));
    window.location.href = 'editor.html';
  } catch (e) {
    alert('Erro ao buscar a review no Letterboxd.\n\nVerifique se o servidor Python está rodando na porta 8000 ou se o link é de uma review válida.');
    btnText.textContent = 'Gerar Story';
    btnIcon.className = 'mat-icon';
    btnIcon.textContent = 'arrow_forward';
    btn.style.opacity = '1';
    btn.style.pointerEvents = 'auto';
  }
}

// Allow Enter key
document.getElementById('link-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleGenerate();
});
</script>

</body>
</html>
